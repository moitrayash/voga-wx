name: Update VOGA data

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data.json'
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-voga-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch METAR + NOTAMs
        run: node fetch-data.js
      - name: Commit data.json if changed
        run: |
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Update VOGA data"
            git push
          else
            echo "No change in data.json"
          fi
